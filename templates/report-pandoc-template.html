<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$</title>
<style>
@font-face {
  font-family: 'Space Grotesk';
  src: url('file:///home/chris/Nextcloud/Github/career-ops/fonts/space-grotesk-latin.woff2') format('woff2');
  font-weight: 300 700;
  font-style: normal;
}
@font-face {
  font-family: 'DM Sans';
  src: url('file:///home/chris/Nextcloud/Github/career-ops/fonts/dm-sans-latin.woff2') format('woff2');
  font-weight: 100 1000;
  font-style: normal;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
body {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  line-height: 1.7;
  color: #1a1a2e;
  background: #ffffff;
  padding: 18mm 18mm 16mm 18mm;
}
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #1a1a2e;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 8px;
}
h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: hsl(220, 70%, 40%);
  border-bottom: 1px solid hsl(220, 70%, 85%);
  padding-bottom: 2px;
  margin-top: 18px;
  margin-bottom: 8px;
}
h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: #1a1a2e;
  margin-top: 12px;
  margin-bottom: 5px;
}
p { font-size: 10.5px; color: #2a2a3e; margin-bottom: 7px; line-height: 1.65; }
ul, ol { padding-left: 14px; margin-bottom: 7px; }
li { font-size: 10.5px; color: #2a2a3e; line-height: 1.65; margin-bottom: 2px; }
table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 12px; }
th {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: hsl(220, 70%, 40%);
  border-bottom: 1.5px solid hsl(220, 70%, 75%);
  padding: 4px 8px 4px 0;
  text-align: left;
}
td {
  padding: 4px 8px 4px 0;
  border-bottom: 1px solid #f0f0f5;
  color: #2a2a3e;
  vertical-align: top;
  line-height: 1.55;
}
tr:last-child td { border-bottom: none; }
blockquote {
  border-left: 3px solid hsl(220, 70%, 55%);
  padding: 6px 12px;
  margin: 8px 0;
  background: hsl(220, 70%, 97%);
  border-radius: 0 3px 3px 0;
}
blockquote p { color: hsl(220, 70%, 25%); font-style: italic; margin: 0; font-size: 10.5px; }
pre { background: #f5f5fa; border: 1px solid #e0e0ea; border-radius: 3px; padding: 8px 10px; margin-bottom: 8px; line-height: 1.5; overflow-x: auto; }
code { font-family: 'Courier New', monospace; font-size: 9px; background: #f5f5fa; border: 1px solid #e0e0ea; border-radius: 2px; padding: 1px 3px; }
pre code { border: none; background: none; padding: 0; }
hr { border: none; border-top: 1px solid hsl(220, 70%, 85%); margin: 14px 0; }
strong { font-weight: 600; color: #1a1a2e; }
em { color: #555; }
</style>
</head>
<body>
$body$
</body>
</html>
